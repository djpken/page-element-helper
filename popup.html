<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      padding: 12px 16px;
      min-width: 200px;
      color: #1a1a1a;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #444;
    }
    select {
      width: 100%;
      padding: 5px 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      cursor: pointer;
    }
    select:focus {
      outline: 2px solid #6366f1;
      outline-offset: 1px;
    }
    .saved {
      margin-top: 8px;
      font-size: 11px;
      color: #22c55e;
      height: 14px;
    }
  </style>
</head>
<body>
  <label for="ai-target">目標 AI 工具</label>
  <select id="ai-target">
    <option value="codex">Codex</option>
    <option value="claude-code">Claude Code</option>
  </select>
  <div class="saved" id="saved-msg"></div>
  <script src="popup.js"></script>
</body>
</html>
