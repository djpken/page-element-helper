<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      padding: 12px 16px;
      min-width: 220px;
      color: #1a1a1a;
    }
    p {
      margin: 0 0 8px;
      color: #444;
      line-height: 1.5;
    }
    button {
      display: block;
      width: 100%;
      padding: 7px 8px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      cursor: pointer;
    }
    button:hover {
      background: #f5f5f5;
    }
    #lang-toggle {
      width: auto;
      float: right;
      margin: 0 0 8px;
      padding: 3px 8px;
      font-size: 12px;
      color: #555;
    }
    #shortcut-label {
      font-size: 12px;
      color: #666;
      margin: 8px 0 0;
    }
  </style>
</head>
<body>
  <button id="lang-toggle"></button>
  <p id="usage"></p>
  <p id="usage-alt"></p>
  <button id="start-picker"></button>
  <button id="record-shortcut"></button>
  <p id="shortcut-label"></p>
  <button id="open-shortcuts"></button>
  <script src="popup.js"></script>
</body>
</html>
